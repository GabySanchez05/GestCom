services:
  app:
    container_name: app
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app                 # Mount your source code from host
      - /app/node_modules      # Isolate node_modules inside the container
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      - PORT=3000
    # On every start/restart: install deps, build, then serve
    command: sh -c "npm ci --include=dev && npm run build && node .next/standalone/server.js"
    restart: unless-stopped
